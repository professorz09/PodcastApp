# Render.com infrastructure-as-code config. Push this to GitHub and on
# Render click "New +" → "Blueprint" → select the repo to auto-create
# the service. Free tier sleeps after 15 min inactivity; first request
# after sleep takes ~30s to wake.
services:
  - type: web
    name: autovid-flask
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      # Gemini fallback for transcript fetching when YouTube blocks the scraper.
      # Set the value in the Render dashboard (sync: false keeps it out of git).
      # Either GEMINI_API_KEY alone, or GCP_SA_KEY + GCP_PROJECT_ID for Vertex.
      - key: GEMINI_API_KEY
        sync: false
      - key: GCP_SA_KEY
        sync: false
      - key: GCP_PROJECT_ID
        sync: false
      # Optional override; defaults to gemini-3.5-flash in code.
      - key: GEMINI_TRANSCRIPT_MODEL
        sync: false